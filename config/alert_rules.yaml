general:
  timezone: "Asia/Shanghai"
  interval_minutes: 3
  max_workers: 8
  dedup_cooldown_minutes: 20
  state_file: "daemon/.alert_state.json"
  trading_sessions:
    - start: "09:30"
      end: "11:30"
    - start: "13:00"
      end: "15:00"

rules:
  price_breakout:
    enabled: true
    # 若未给某只股票配置具体心理价位，则不会触发“心理价位突破”，仅按 move_pct 提示剧烈波动。
    default:
      move_pct: 3.0
    symbol_levels:
      # "00700":
      #   above: 380.0
      #   below: 330.0
      # "600036":
      #   above: 50.0
      #   below: 42.0

  orderbook_dump:
    enabled: true
    min_sell_lot: 10000
    sell_buy_ratio: 3.0
    intraday_volume_spike_ratio: 2.5
    lookback_points: 30

  technical_warning:
    enabled: true
    rsi_overbought: 80
    rsi_oversold: 20
    macd_flip_check: true

  capital_flow:
    enabled: true
    northbound_min_days: 3
    block_trade_premium_min: 0
    composite_score_alert: 70

push:
  channel: "telegram"  # telegram | serverchan | pushplus
  serverchan:
    enabled: false
    sendkey: ""
  pushplus:
    enabled: false
    token: ""
    topic: ""
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
    api_base: "https://api.telegram.org"
